<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - IntelliBiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="logo">🚀 IntelliBiz</div>
        <div class="nav-links">
            <span onclick="window.location.href='index.html'" data-en="Home" data-zh="首页">Home</span>
            <span data-en="Dashboard" data-zh="仪表板">Dashboard</span>
            <span data-en="Reports" data-zh="报告">Reports</span>
        </div>
        <div class="lang-toggle" onclick="toggleLanguage()">
            <span class="active" id="langEN">EN</span>
            <span>/</span>
            <span class="inactive" id="langZH">中文</span>
        </div>
    </nav>

    <div class="dashboard-container">
        <h1 data-en="📊 Business Dashboard" data-zh="📊 业务仪表板">📊 Business Dashboard</h1>
        
        <!-- File info section -->
        <div id="fileInfo" style="margin-bottom: 30px; padding: 15px 20px; background: rgba(102, 126, 234, 0.05); border-radius: 10px; border-left: 4px solid rgba(102, 126, 234, 0.5); display: none;">
            <small style="color: #94a3b8;">
                <span data-en="File:" data-zh="文件：">File:</span> 
                <span id="fileName" style="font-weight: 600; color: #667eea;"></span>
                <span data-en="| Uploaded:" data-zh="| 上传时间：">| Uploaded:</span> 
                <span id="uploadTime" style="font-weight: 600; color: #667eea;"></span>
            </small>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card" data-value="0">
                <h3 data-en="Revenue" data-zh="收入">Revenue</h3>
                <p id="revenueValue">RM0</p>
            </div>
            <div class="kpi-card" data-value="0">
                <h3 data-en="Orders" data-zh="订单">Orders</h3>
                <p id="ordersValue">0</p>
            </div>
            <div class="kpi-card" data-value="0">
                <h3 data-en="Growth Rate" data-zh="增长率">Growth Rate</h3>
                <p id="growthValue">+0%</p>
            </div>
            <div class="kpi-card" data-value="0">
                <h3 data-en="Top Product" data-zh="热销产品">Top Product</h3>
                <p id="productValue">Unknown</p>
            </div>
        </div>

        <div class="chart-placeholder">
            <h2 data-en="📈 Sales Trend Chart" data-zh="📈 销售趋势图">📈 Sales Trend Chart</h2>
            <p data-en="Advanced chart visualization coming in Version 2 with real-time data updates" data-zh="第 2 版中将推出带实时数据更新的高级图表可视化">Advanced chart visualization coming in Version 2 with real-time data updates</p>
        </div>

        <!-- Clear data button -->
        <div style="text-align: center; margin-top: 40px;">
            <button onclick="clearDataAndReset()" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); padding: 12px 30px; font-size: 14px;" data-en="Upload New Data" data-zh="上传新数据">Upload New Data</button>
        </div>
    </div>

    <script src="dataStorage.js"></script>
    <script src="analyticsCalculator.js"></script>
    <script>
        let currentLang = localStorage.getItem('language') || 'en';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            updatePageLanguage();
        }

        function toggleLanguage() {
            const newLang = currentLang === 'en' ? 'zh' : 'en';
            setLanguage(newLang);
        }

        function updatePageLanguage() {
            const elements = document.querySelectorAll('[data-en][data-zh]');
            elements.forEach(el => {
                if (currentLang === 'en') {
                    el.textContent = el.getAttribute('data-en');
                } else {
                    el.textContent = el.getAttribute('data-zh');
                }
            });

            const langEN = document.getElementById('langEN');
            const langZH = document.getElementById('langZH');
            if (currentLang === 'en') {
                langEN.classList.add('active');
                langEN.classList.remove('inactive');
                langZH.classList.remove('active');
                langZH.classList.add('inactive');
            } else {
                langZH.classList.add('active');
                langZH.classList.remove('inactive');
                langEN.classList.remove('active');
                langEN.classList.add('inactive');
            }

            document.documentElement.lang = currentLang;
        }

        /**
         * Load and display data from storage
         */
        function loadDashboardData() {
            const storedData = DataStorage.getData();

            if (storedData && storedData.metrics) {
                // Display file information
                const fileInfoDiv = document.getElementById('fileInfo');
                const fileName = document.getElementById('fileName');
                const uploadTime = document.getElementById('uploadTime');

                fileName.textContent = storedData.fileName || 'Unknown File';
                
                if (storedData.uploadTime) {
                    const date = new Date(storedData.uploadTime);
                    uploadTime.textContent = date.toLocaleString(currentLang === 'en' ? 'en-MY' : 'zh-CN');
                }

                fileInfoDiv.style.display = 'block';

                // Get metrics
                const metrics = storedData.metrics;

                // Update KPI values
                document.getElementById('revenueValue').textContent = 
                    AnalyticsCalculator.formatNumber(metrics.totalRevenue, 'revenue');
                
                document.getElementById('ordersValue').textContent = 
                    AnalyticsCalculator.formatNumber(metrics.totalOrders, 'orders');
                
                document.getElementById('growthValue').textContent = 
                    AnalyticsCalculator.formatNumber(metrics.growthRate, 'growth');
                
                document.getElementById('productValue').textContent = metrics.topProduct;

                // Update data attributes for animation
                document.querySelectorAll('.kpi-card')[0].setAttribute('data-value', metrics.totalRevenue);
                document.querySelectorAll('.kpi-card')[1].setAttribute('data-value', metrics.totalOrders);
                document.querySelectorAll('.kpi-card')[2].setAttribute('data-value', metrics.growthRate);

                console.log('Dashboard data loaded successfully');
            } else {
                // No data - show default values
                console.log('No data found, displaying defaults');
                document.getElementById('fileInfo').style.display = 'none';
            }
        }

        /**
         * Clear stored data and redirect to upload page
         */
        function clearDataAndReset() {
            DataStorage.clearData();
            const confirmMsg = currentLang === 'en' 
                ? 'Data cleared. Redirecting to upload page...' 
                : '数据已清除。重定向到上传页面...';
            alert(confirmMsg);
            window.location.href = 'upload.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            updatePageLanguage();
            loadDashboardData();

            // Animate cards
            const cards = document.querySelectorAll('.kpi-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(20px)';
                    card.style.transition = 'all 0.6s ease-out';
                    
                    setTimeout(() => {
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }, 50);
                }, index * 100);
            });
        });
    </script>

</body>

</html>
